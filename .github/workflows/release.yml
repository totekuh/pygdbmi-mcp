name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Show artifacts
        run: ls -la dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute artifact checksums
        id: checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Write release notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          {
            echo "# pygdbmi-mcp ${TAG}"
            echo
            echo "MCP server exposing GDB debugging via pygdbmi — **52 tools** covering session management, execution control, breakpoints/watchpoints/catchpoints, memory read/write/search, disassembly, source listing, type/struct inspection, symbol lookup, remote debugging, and GDB settings."
            echo
            echo "## Install"
            echo
            echo '```bash'
            echo "pip install https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/pygdbmi_mcp-${VERSION}-py3-none-any.whl"
            echo '```'
            echo
            echo "Or from source:"
            echo
            echo '```bash'
            echo "git clone https://github.com/${GITHUB_REPOSITORY}.git"
            echo "cd pygdbmi-mcp && python3 -m venv .venv && .venv/bin/pip install -e ."
            echo '```'
            echo
            echo "## Register with Claude Code"
            echo
            echo '```bash'
            echo "claude mcp add pygdbmi-mcp /path/to/.venv/bin/pygdbmi-mcp"
            echo '```'
            echo
            echo "## Requirements"
            echo
            echo "- Python ≥ 3.10"
            echo "- GDB installed on the host (\`gdb\` or \`gdb-multiarch\`)"
            echo "- Linux (tested), likely works on macOS with GDB"
            echo
            echo "## Artifacts"
            echo
            echo "This release includes a prebuilt wheel, a source distribution, and SHA-256 checksums. See **Assets** below."
            echo
            echo "### SHA-256 checksums"
            echo
            echo '```'
            cat dist/SHA256SUMS
            echo '```'
            echo
            echo "## What's changed"
            echo
          } > RELEASE_NOTES.md
          echo "path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: pygdbmi-mcp ${{ steps.tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
